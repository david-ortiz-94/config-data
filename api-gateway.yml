server:
  port: 8088

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka

spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      routes:
        - id: parameter
          uri: lb://api/parameter
          predicates:
            - Path=/**
        - id: person
          uri: lb://api/person
          predicates:
            - Path=/**